<div class="container">
  <h3 mat-dialog-title>Are you sure?</h3>
  <div mat-dialog-content>
    <div class="row">
      <!--Gift Icon-->
      <div class="col text-center">
        <i class="fas fa-lock fa-6x col-red"></i>
      </div>
      <!--Modal Text-->
      <div class="col-12">
        <dl class="dl-horizontal">
          <dt class="pull-left me-2">Employee No:</dt>
          <dd>{{ account.employeeNumber }}</dd>
          <dt class="pull-left me-2">Firstname:</dt>
          <dd>{{ account.firstname }}</dd>
          <dt class="pull-left me-2">Lastname:</dt>
          <dd>{{ account.lastname }}</dd>
          <dt class="pull-left me-2">Email:</dt>
          <dd>{{ account.email }}</dd>
          <dt class="pull-left me-2">phonenumber:</dt>
          <dd>{{ account.phone }}</dd>
          <dt class="pull-left me-2">Role:</dt>
          <dd>{{ account.role }}</dd>
          <dt class="pull-left me-2">Status:</dt>
          <dd>
            <span
              class="badge badge-pill"
              [ngClass]="{
                'col-green': account.status === 'ACTIVE',
                'col-purple': account.status === 'LOCKED'
              }"
            >
              {{ account.status }}
            </span>
          </dd>
        </dl>
      </div>
    </div>
  </div>
  <mat-dialog-actions align="end" class="mb-1">
    <button
      mat-flat-button
      color="primary"
      [class.auth-spinner]="loading"
      (click)="confirmLock()"
    >
      Lock User
    </button>
    <button mat-flat-button color="accent" (click)="onNoClick()" tabindex="-1">
      Cancel
    </button>
  </mat-dialog-actions>
</div>
