<section class="content">
  <div class="content-block">
    <app-user-widgets></app-user-widgets>

    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
          <div class="body">
            <div class="table-responsive">
              <div class="materialTableHeader">
                <div class="row">
                  <div class="col-8">
                    <ul class="header-buttons-left ms-0">
                      <li class="dropdown m-l-20">
                        <label for="search-input"
                          ><i class="material-icons search-icon"
                            >search</i
                          ></label
                        >
                        <input
                          placeholder="Search"
                          type="text"
                          (keyup)="applyFilter($event)"
                          #filter
                          class="browser-default search-field"
                          aria-label="Search box"
                        />
                      </li>
                      <li>
                        <div class="m-l-10" matTooltip="REFRESH">
                          <button
                            mat-mini-fab
                            color="primary"
                            (click)="refresh()"
                          >
                            <mat-icon class="col-white">refresh</mat-icon>
                          </button>
                        </div>
                      </li>
                    </ul>
                  </div>
                  <div class="col-4">
                    <ul class="header-buttons">
                      <li>
                        <div class="export-button m-l-10" matTooltip="XLSX">
                          <img
                            src="assets/images/icons/xlsx.png"
                            alt=""
                            (click)="
                              exporter.exportTable('xlsx', {
                                fileName: 'locked-users',
                                sheet: 'sheet1'
                              })
                            "
                          />
                        </div>
                      </li>
                      <li>
                        <div class="export-button m-l-10" matTooltip="PDF">
                          <img
                            src="assets/images/icons/pdf.png"
                            alt="Export to PDF"
                            (click)="exportAsPDF()"
                          />
                        </div>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <mat-table
                #table
                matTableExporter
                [dataSource]="dataSource"
                matSort
                class="mat-cell"
                #exporter="matTableExporter"
              >
                <ng-container matColumnDef="select">
                  <mat-header-cell
                    *matHeaderCellDef
                    [ngClass]="'tbl-col-width-per-6'"
                  >
                    <mat-checkbox
                      (change)="$event ? masterToggle() : null"
                      [checked]="selection.hasValue() && isAllSelected()"
                      [indeterminate]="selection.hasValue() && !isAllSelected()"
                      [ngClass]="'tbl-checkbox'"
                    >
                    </mat-checkbox>
                  </mat-header-cell>
                  <mat-cell
                    *matCellDef="let row"
                    [ngClass]="'tbl-col-width-per-6'"
                  >
                    <mat-checkbox
                      (click)="$event.stopPropagation()"
                      (change)="$event ? selection.toggle(row) : null"
                      [checked]="selection.isSelected(row)"
                      [ngClass]="'tbl-checkbox'"
                    >
                    </mat-checkbox>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="id">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-3"
                    >Id</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    class="column-nowrap psl-3 tbl-col-width-per-3"
                    >{{ user.id }}</mat-cell
                  >
                </ng-container>
                <ng-container matColumnDef="employeeNumber">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                    >Employee No</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                    >{{ user.employeeNumber }}</mat-cell
                  >
                </ng-container>
                <ng-container matColumnDef="firstname">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                    >Firstname</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    (contextmenu)="onContextMenu($event, user)"
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                  >
                    {{ user.firstname }}</mat-cell
                  >
                </ng-container>
                <ng-container matColumnDef="lastname">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                    >Lastname</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    (contextmenu)="onContextMenu($event, user)"
                    class="column-nowrap psl-3 tbl-col-width-per-12"
                  >
                    {{ user.lastname }}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="phonenumber">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-15"
                    >Phonenumber</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    (contextmenu)="onContextMenu($event, user)"
                    class="column-nowrap psl-3 tbl-col-width-per-15"
                  >
                    {{ user.phone }}</mat-cell
                  >
                </ng-container>
                <ng-container matColumnDef="email">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="column-nowrap psl-3 tbl-col-width-per-50"
                    >Email</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    (contextmenu)="onContextMenu($event, user)"
                    class="column-nowrap psl-3 tbl-col-width-per-50"
                  >
                    {{ user.email }}</mat-cell
                  >
                </ng-container>
                <ng-container matColumnDef="status">
                  <mat-header-cell
                    *matHeaderCellDef
                    mat-sort-header
                    class="psl-3 tbl-col-width-per-8"
                  >
                    Status
                  </mat-header-cell>

                  <mat-cell
                    *matCellDef="let row"
                    class="column-nowrap psl-3 tbl-col-width-per-8"
                  >
                    <span
                      class="badge badge-pill"
                      [ngClass]="{
                        'col-green': row.status === 'ACTIVE',
                        'col-purple': row.status === 'LOCKED'
                      }"
                    >
                      {{ row.status }}
                    </span>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="viewDetails">
                  <mat-header-cell
                    class="column-nowrap psl-3 tbl-col-width-per-20 pr-0"
                    *matHeaderCellDef
                    >View Details</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    class="tcolumn-nowrap psl-3 tbl-col-width-per-20 pr-0"
                  >
                    <button
                      class="badge badge-solid-blue btn btn btn-sm m-1"
                      (click)="detailsCall(user)"
                    >
                      View Details
                    </button>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="actions">
                  <mat-header-cell
                    class="column-nowrap psl-3 tbl-col-width-per-20 pr-0"
                    *matHeaderCellDef
                    >Unlock Account</mat-header-cell
                  >
                  <mat-cell
                    *matCellDef="let user"
                    class="column-nowrap psl-3 tbl-col-width-per-20 pr-0"
                  >
                    <button
                      class="badge badge-solid-green btn btn btn-sm m-1"
                      (click)="unlockAccountCall(user)"
                    >
                      Unlock Account
                    </button>
                  </mat-cell>
                </ng-container>
                <mat-header-row
                  *matHeaderRowDef="displayedColumns"
                ></mat-header-row>
                <mat-row
                  *matRowDef="let row; columns: displayedColumns"
                  [style.cursor]="'pointer'"
                  matRipple
                >
                </mat-row>
              </mat-table>

              <div
                *ngIf="!isLoading && dataSource?.data?.length === 0"
                class="no-records text-center p-3"
                style="font-size: 20px; color: #000000"
              >
                <h4>0 Records Found.</h4>
              </div>

              <div *ngIf="isLoading" class="tbl-spinner">
                <mat-progress-spinner
                  color="primary"
                  [diameter]="40"
                  mode="indeterminate"
                >
                </mat-progress-spinner>
              </div>
              <div
                style="visibility: hidden; position: fixed"
                [style.left]="contextMenuPosition.x"
                [style.top]="contextMenuPosition.y"
                [matMenuTriggerFor]="contextMenu"
              ></div>
              <mat-menu #contextMenu="matMenu">
                <ng-template matMenuContent let-item="item">
                  <button mat-menu-item (click)="addNew()">
                    <mat-icon>add_box</mat-icon>
                    <span>Add Record</span>
                  </button>
                  <button mat-menu-item (click)="editCall(item)">
                    <mat-icon>create</mat-icon>
                    <span>Edit Record</span>
                  </button>
                  <button mat-menu-item (click)="deleteItem(item.id, item)">
                    <mat-icon>delete</mat-icon>
                    <span>Delete Record</span>
                  </button>
                  <button mat-menu-item (click)="refresh()">
                    <mat-icon>refresh</mat-icon>
                    <span>Refresh Record</span>
                  </button>
                  <button mat-menu-item disabled>
                    <mat-icon>no_encryption</mat-icon>
                    <span>Disable</span>
                  </button>
                  <button mat-menu-item [matMenuTriggerFor]="nestedmenu">
                    <mat-icon>list_alt</mat-icon>
                    <span> Nested Menu</span>
                  </button>
                </ng-template>
              </mat-menu>
              <mat-menu #nestedmenu="matMenu">
                <button mat-menu-item>
                  <mat-icon>mail_outline</mat-icon>
                  <span>Item 1</span>
                </button>
                <button mat-menu-item>
                  <mat-icon>call</mat-icon>
                  <span>Item 2</span>
                </button>
                <button mat-menu-item>
                  <mat-icon>chat</mat-icon>
                  <span>Item 3</span>
                </button>
              </mat-menu>
              <mat-paginator
                #paginator
                [pageIndex]="0"
                [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"
              >
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
