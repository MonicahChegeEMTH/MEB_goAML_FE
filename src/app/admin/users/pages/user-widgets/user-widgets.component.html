<div class="row">
  <div class="reports-summary-card" (click)="viewInactiveUserAccounts()">
    <div class="reports-summary-header">
      <div class="reports-summary-header">
        <h3 class="m-b-20">Total Users</h3>
        <h2 class="text-end">
          <span class="float-start">{{ totalAccounts }}</span
          ><i class="fas fa-users"></i>
        </h2>
      </div>
    </div>
  </div>
  <div class="reports-summary-card" (click)="viewActivateUserAccounts()">
    <div class="reports-summary-header">
      <div class="reports-summary-header">
        <h3 class="m-b-20">Active Users</h3>
        <h2 class="text-end">
          <span class="float-start">{{ activeAccounts }}</span
          ><i class="fas fa-users"></i>
        </h2>
      </div>
    </div>
  </div>
  <div class="reports-summary-card" (click)="viewLockedAccounts()">
    <div class="reports-summary-header">
      <div class="reports-summary-header">
        <h3 class="m-b-20">Locked Users</h3>
        <h2 class="text-end">
          <span class="float-start">{{ lockedAccounts }}</span
          ><i class="fas fa-users"></i>
        </h2>
      </div>
    </div>
  </div>
</div>
