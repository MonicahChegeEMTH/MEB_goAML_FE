<div class="addContainer">
  <div class="contact-details">
    <div class="modalHeader">
      <div class="contact-details-name mb-1">Select Indicator</div>
      <button
        mat-icon-button
        (click)="dialogRef.close()"
        aria-label="Close dialog"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div mat-dialog-content>
      <div class="table-responsive m-t-5 indicator-container">
        <div
          class="row"
          style="background-color: rgba(163, 159, 159, 0.297); margin: 5px"
        >
          <div class="col-6 d-flex align-items-center">
            <h6 style="margin: 5px"><strong>Indicators</strong></h6>
          </div>
          <div class="col-6">
            <div class="form-line m-b-10 m-t-10 m-l-2 m-r-2">
              <input
                placeholder="Filter..."
                type="text"
                (keyup)="applyFilter($event)"
                #filter
                class="form-control"
              />
            </div>
          </div>
        </div>

        <mat-table #table matTableExporter [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="select">
            <mat-header-cell
              *matHeaderCellDef
              [ngClass]="'tbl-col-width-per-12'"
            >
              <mat-checkbox
                (change)="$event ? masterToggle() : null"
                [checked]="selection.hasValue() && isAllSelected()"
                [indeterminate]="selection.hasValue() && !isAllSelected()"
                [ngClass]="'tbl-checkbox'"
              >
              </mat-checkbox>
            </mat-header-cell>
            <mat-cell *matCellDef="let row" [ngClass]="'tbl-col-width-per-12'">
              <mat-checkbox
                (click)="$event.stopPropagation()"
                (change)="$event ? selection.toggle(row) : null"
                [checked]="selection.isSelected(row)"
                [ngClass]="'tbl-checkbox'"
              >
              </mat-checkbox>
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="code">
            <mat-header-cell *matHeaderCellDef mat-sort-header
              >Code</mat-header-cell
            >
            <mat-cell *matCellDef="let indicator">{{
              indicator.code
            }}</mat-cell>
          </ng-container>

          <ng-container matColumnDef="description">
            <mat-header-cell *matHeaderCellDef mat-sort-header
              >Description</mat-header-cell
            >
            <mat-cell *matCellDef="let indicator">{{
              indicator.description
            }}</mat-cell>
          </ng-container>

          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row
            *matRowDef="let row; columns: displayedColumns"
            style="cursor: pointer"
            matRipple
            (click)="toggleRow(row)"
          >
          </mat-row>

          <mat-cell *matNoDataRow colspan="2">
            No data matching the filter "{{ filter.value }}"
          </mat-cell>
        </mat-table>

        <div *ngIf="isLoading" class="lookup-spinner">
          <mat-progress-spinner
            class="gold-spinner"
            [diameter]="40"
            mode="indeterminate"
          ></mat-progress-spinner>
        </div>

        <mat-paginator
          [pageSize]="5"
          [pageSizeOptions]="[2, 5, 10]"
          aria-label="Select page of indicators"
          showFirstLastButtons
        ></mat-paginator>

        <div style="text-align: right; margin-top: 10px">
          <button mat-button (click)="close()">Cancel</button>
          <button
            mat-raised-button
            color="primary"
            (click)="closeWithSelection()"
          >
            Select
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
