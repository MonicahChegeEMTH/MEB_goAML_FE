<section class="content">
  <div class="content-block">
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="'Reports'" [items]="['Staff', 'Reports']"
        [active_item]="'All reports'"></app-breadcrumb>
    </div>


    <div class="row">
      <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
        <div class="card">
          <br>
          <div class="header">
            <h2>Collections Report</h2>
          </div>
          <div class="body">
            <div class="doc-file-type">
              <ul class="list-unstyled" style="position: relative; height: 350px;">

                <li (click)="DailyCOllectionReport()" class="d-flex mb-3">
                  <!-- <div class="example-action-buttons">
                      <button mat-button (click)="accordion.openAll()">Expand All</button>
                      <button mat-button (click)="accordion.closeAll()">Collapse All</button>
                    </div> -->
                  <mat-accordion class="example-headers-align" multi>

                    <mat-expansion-panel>
                      <mat-expansion-panel-header>
                        <mat-panel-title>
                          Collection per Date report
                        </mat-panel-title>
                        <!-- <mat-panel-description>
                          Inform the date you wish to travel
                          <mat-icon>date_range</mat-icon>
                        </mat-panel-description> -->
                      </mat-expansion-panel-header>

                      <form class="register-form" [formGroup]="reportCollectionForm">
                        <div class="row">

                          <mat-form-field class="m-l-5">
                            <input matInput [matDatepicker]="picker" placeholder="Choose a date" formControlName="date">
                            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                            <mat-datepicker #picker></mat-datepicker>
                          </mat-form-field>



                          <div class="example-button-row">

                            <button mat-raised-button color="primary" [disabled]="!reportCollectionForm.valid"
                              (click)="generateStatement()" (click)="accordion.closeAll()">
                              <span *ngIf="isloading" class="spinner-border spinner-border-sm mr-1"></span>
                              <b>Generate</b>
                            </button>
                          </div>

                        </div>

                      </form>



                    </mat-expansion-panel>
                  </mat-accordion>
                </li>

                <li (click)="collectionsPerCollector('Report For Single User Action Items')" class="d-flex mb-3">

                  <!-- <div class="example-action-buttons">
                          <button mat-button (click)="accordion.openAll()">Expand All</button>
                          <button mat-button (click)="accordion.closeAll()">Collapse All</button>
                        </div> -->
                  <mat-accordion class="example-headers-align" multi>
                    <mat-progress-bar mode="indeterminate" *ngIf="isloading"></mat-progress-bar>
                    <mat-expansion-panel>
                      <mat-expansion-panel-header>
                        <mat-panel-title>
                          Collection per Collector for specific date report
                        </mat-panel-title>
                        <!-- <mat-panel-description>
                              Inform the date you wish to travel
                              <mat-icon>date_range</mat-icon>
                            </mat-panel-description> -->
                      </mat-expansion-panel-header>

                      <form class="register-form" [formGroup]="reportCollectionForm">
                        <div class="row">

                          <mat-form-field class="m-l-5">
                            <input matInput [matDatepicker]="picker1" placeholder="Choose a date"
                              formControlName="date">
                            <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
                            <mat-datepicker #picker1></mat-datepicker>
                          </mat-form-field>



                          <div class="example-button-row">

                            <button mat-raised-button color="primary" [disabled]="!reportCollectionForm.valid"
                              (click)="generateCollectionsPerCollector()" (click)="accordion.closeAll()">
                              <span *ngIf="isloading" class="spinner-border spinner-border-sm mr-1"></span>
                              <b>Generate</b>
                            </button>
                          </div>

                        </div>
                      </form>

                    </mat-expansion-panel>
                  </mat-accordion>

                </li>
                <li (click)="collectionsPerLocation('Report For Single User Action Items')" class="d-flex mb-3">


                  <!-- <div class="example-action-buttons">
                            <button mat-button (click)="accordion.openAll()">Expand All</button>
                            <button mat-button (click)="accordion.closeAll()">Collapse All</button>
                          </div> -->
                  <mat-accordion class="example-headers-align" multi>
                    <mat-progress-bar mode="indeterminate" *ngIf="isloading"></mat-progress-bar>
                    <mat-expansion-panel>
                      <mat-expansion-panel-header>
                        <mat-panel-title>
                          Collection per Location for specific date report
                        </mat-panel-title>
                        <!-- <mat-panel-description>
                                Inform the date you wish to travel
                                <mat-icon>date_range</mat-icon>
                              </mat-panel-description> -->
                      </mat-expansion-panel-header>

                      <form class="register-form" [formGroup]="reportCollectionForm">
                        <div class="row">

                          <mat-form-field class="m-l-5">
                            <input matInput [matDatepicker]="picker3" placeholder="Choose a date"
                              formControlName="date">
                            <mat-datepicker-toggle matSuffix [for]="picker3"></mat-datepicker-toggle>
                            <mat-datepicker #picker3></mat-datepicker>
                          </mat-form-field>


                          <div class="example-button-row">

                            <button mat-raised-button color="primary" [disabled]="!reportCollectionForm.valid"
                              (click)="generateCollectionsPerLocations()" (click)="accordion.closeAll()">
                              <span *ngIf="isloading" class="spinner-border spinner-border-sm mr-1"></span>
                              <b>Generate</b>
                            </button>
                          </div>

                        </div>
                      </form>

                    </mat-expansion-panel>
                  </mat-accordion>


                </li>

              </ul>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
        <div class="card">
          <br>
          <div class="header">
            <h2>Farmer statement Report</h2>
          </div>
          <div class="body">
            <div class="doc-file-type">
              <ul class="list-unstyled" style="position: relative; height: 350px;">

                <li (click)="farmerStatement()" class="d-flex mb-3">
                  <span class="msr-3 align-self-center img-icon info-rgba text-info"><i
                      class="far fa-file-archive"></i></span>

                  <div class="set-flex">
                    <h5 class="font-16 mb-1">Farmers Statement report</h5>
                    <p>Statement report for specific farmer</p>
                  </div>
                  <div class="ms-auto">
                    <td>
                      <i class="far fa-arrow-alt-circle-down"></i>
                    </td>
                  </div>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>

  </div>
