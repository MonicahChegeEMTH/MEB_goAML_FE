<div class="auth-wrapper-container">

  <!-- Left/Image Section -->
  <div class="auth-image-section">
    <!--<img src="assets/images/dairy farm.jpeg" alt="Dairy Cow" />-->
   <img src="assets/images/dairy farm.jpeg" alt="Dairy Farm" class="auth-image" />
  </div>

  <!-- Right/Form Section -->
  <div class="auth-form-section">
    <div class="form-section">

      <div class="text-center">
        <img src="assets/images/bahati.png" alt="Bahati Logo" class="logo-image" />
        <h2 class="welcome-msg">Bahati Dairy Solution</h2>
        <p class="auth-signup-text text-muted">Enter credentials below:</p>
        <h2 class="login-title">Sign in</h2>
      </div>

      <!-- Login Form -->
      <form class="validate-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">

        <div class="row">
          <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
            <mat-form-field class="example-full-width" appearance="outline">
              <mat-label>Username</mat-label>
              <input matInput formControlName="username" />
              <mat-icon matSuffix color="primary">face</mat-icon>
              <mat-error *ngIf="authForm.get('username')?.hasError('required')">
                Username is required
              </mat-error>
            </mat-form-field>
          </div>
        </div>

        <div class="row">
          <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
            <mat-form-field class="example-full-width" appearance="outline">
              <mat-label>Password</mat-label>
              <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" />
              <a class="show-pwd-icon" href="#" (click)="hide = !hide; $event.preventDefault()" matSuffix
                [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                <mat-icon color="primary">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </a>
              <mat-error *ngIf="authForm.get('password')?.hasError('required')">
                Password is required
              </mat-error>
            </mat-form-field>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-5">
          <div class="form-check">
            <label class="form-check-label">
              <input class="form-check-input" type="checkbox" value=""> Remember me
              <span class="form-check-sign">
                <span class="check"></span>
              </span>
            </label>
          </div>
          <a class="txt1" style="color: #046307" routerLink="/authentication/forgot-password">Forgot Password?</a>
        </div>

        <div class="container-auth-form-btn text-center">
          <button mat-raised-button color="primary" [class.auth-spinner]="loading"
            [disabled]="loading || !authForm.valid" class="auth-form-btn" type="submit">
            Login
          </button>
        </div>
      </form>

      <!-- Footer -->
      <div class="auth-footer text-center mt-4">
        <small class="text-muted">© 2025 Emtech Dairy Solution. All rights reserved.</small><br />
        <a href="https://www.emtechhouse.co.ke/" target="_blank" class="website-link" rel="noopener noreferrer">
          www.emtechhouse.co.ke
        </a><br />

        <!-- Social Media Icons -->
        <div class="social-icons mt-2">
          <a href="https://www.linkedin.com/company/bahati-agroprocessors-limited/" target="_blank" rel="noopener noreferrer" style="margin: 0 8px;">
            <img src="assets/images/linkedin-svgrepo-com.svg" alt="LinkedIn" width="24" height="24" />
          </a>
          <a href="https://www.facebook.com/BahatiDairies/" target="_blank" rel="noopener noreferrer" style="margin: 0 8px;">
            <img src="assets/images/facebook-svgrepo-com.svg" alt="Facebook" width="24" height="24" />
          </a>
          <a href="https://x.com/BahatiDairies" target="_blank" rel="noopener noreferrer" style="margin: 0 8px;">
            <img src="assets/images/twitter-svgrepo-com.svg" alt="X (Twitter)" width="24" height="24" />
          </a>
        </div>
      </div>

    </div>
  </div>
</div>
