<div class="auth-container">
  <div class="auth-main container-fluid p-0">
    <div class="row no-gutters w-100">

      <!-- Left image section -->
      <div class="col-sm-6 d-none d-sm-block left-img-container pr-4">
        <img src="assets/images/dairy farm.jpeg" alt="Dairy Cow" class="responsive-img" />
      </div>

      <!-- Right form section -->
      <div class="col-sm-6 auth-form-section d-flex align-items-center">
        <div class="form-section w-100">
          <div class="auth-wrapper mx-auto" style="max-width: 420px;">

            <!-- Logo -->
            <div class="text-center mb-4">
              <img src="assets/images/bahati.png" class="px-2 mx-2" alt="Logo" style="max-width: 100px;" />
            </div>

            <!-- Title -->
            <div class="text-center mb-3">
              <h2 class="welcome-msg mb-1" style="font-weight: 600;">Forgot Password</h2>
              <p class="auth-signup-text text-muted mb-0" style="font-size: 15px;">Let Us Help You</p>
            </div>

            <!-- Form -->
            <form class="validate-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">

              <!-- Reset Method -->
              <div class="row justify-content-center">
                <div class="col-12 text-center mb-3">
                  <label class="d-block mb-2">Reset Method:</label>
                  <mat-radio-group
                    class="d-flex justify-content-center gap-3 mb-3"
                    (change)="selectOption($event)"
                    formControlName="addAttendeesOptions">
                    <mat-radio-button value="Email" checked>Email</mat-radio-button>
                    <mat-radio-button value="Mobile">Mobile</mat-radio-button>
                  </mat-radio-group>
                </div>
              </div>

              <!-- Email Section -->
              <div *ngIf="emailSelected" class="row">
                <div class="col-12 mb-2">
                  <div class="error-subheader2 mb-2 text-center">Enter your registered email address</div>
                  <mat-form-field class="w-100 mat-bordered" appearance="outline">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" required>
                    <mat-icon matSuffix>mail</mat-icon>
                    <mat-error *ngIf="authForm.get('email')?.hasError('required') || authForm.get('email')?.touched">
                      Please enter a valid email address
                    </mat-error>
                  </mat-form-field>
                </div>
              </div>

              <!-- Mobile Section -->
              <div *ngIf="mobileSelected" class="row">
                <div class="col-12 mb-2">
                  <div class="error-subheader2 mb-2 text-center">Enter your registered mobile number</div>
                  <mat-form-field class="w-100 mat-bordered" appearance="outline">
                    <mat-label>Mobile</mat-label>
                    <input matInput formControlName="mobile" required>
                    <mat-icon matSuffix>phone</mat-icon>
                    <mat-error *ngIf="authForm.get('mobile')?.hasError('required') || authForm.get('mobile')?.touched">
                      Please enter a valid mobile number
                    </mat-error>
                  </mat-form-field>
                </div>
              </div>

              <!-- Submit Button -->
              <div class="text-center mt-4">
                <button mat-flat-button color="primary" class="auth-form-btn" type="submit" [disabled]="loading">
                  Reset My Password
                </button>
              </div>

              <!-- Back to login -->
              <div class="text-center mt-3">
                <a routerLink="/authentication/signin" class="txt1">Login?</a>
              </div>

            </form>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
