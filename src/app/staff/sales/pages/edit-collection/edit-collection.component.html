<div class="content-block bg">
    <div class="row clearfix bg">
        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
            <div class="card">
                <div class="modalHeader">
                    <div class="editRowModal">
                        <div class="modalHeader clearfix">
                            <div class="modalHeader clearfix">
                                <div class="modal-about">
                                    <div class="font-weight-bold p-t-5 font-17">
                                       Update collection
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
                        <mat-icon>close</mat-icon>
                    </button>
                </div>
                <div mat-dialog-content>
                    <form class="register-form m-4" [formGroup]="editForm">
                        <div class="row">
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Delivery No.</mat-label>
                                        <input matInput formControlName="collectionNo" required readonly/>
                                        <mat-error *ngIf="editForm.get('collectionNo').hasError('required')">
                                            collectionNo is required
                                        </mat-error>
                                    </mat-form-field>
                                    <mat-form-field class="example-full-width" appearance="outline">
                                        <mat-label>Farmer No.</mat-label>
                                        <input matInput formControlName="farmer_no" required readonly/>
                                        <mat-error *ngIf="editForm.get('farmer_no').hasError('required')">
                                            farmer_no is required
                                        </mat-error>
                                    </mat-form-field>
                                </div>
                                <mat-form-field class="example-full-width" appearance="outline">
                                    <mat-label>Select can</mat-label>
                                    <mat-select formControlName="canNo" required>
                                        <mat-option *ngFor="let can of cans" [value]="can.canNo">
                                            {{ can.canName  }} - {{can.canNo}}
                                        </mat-option>
                                    </mat-select>
                                    <mat-error *ngIf="editForm.get('canNo').hasError('required')">
                                        Can is required
                                    </mat-error>
                                </mat-form-field>
                            </div>
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                <mat-form-field class="example-full-width" appearance="outline">
                                    <mat-label>Select Route</mat-label>
                                    <mat-select formControlName="routeFk" required>
                                        <mat-option *ngFor="let route of routes" [value]="route.id">
                                            {{ route.route }}
                                        </mat-option>
                                    </mat-select>
                                    <mat-error *ngIf="editForm.get('routeFk').hasError('required')">
                                        Route is required
                                    </mat-error>
                                </mat-form-field>
                            </div>

                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                <mat-form-field class="example-full-width" appearance="outline">
                                    <mat-label>Quantity</mat-label>
                                    <input matInput formControlName="quantity" required readonly/>
                                    <mat-error *ngIf="editForm.get('quantity').hasError('required')">
                                        Quantity is required
                                    </mat-error>
                                </mat-form-field>
                            </div>

                            <div class="row">
                                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                    <div class="example-button-row">
                                        <button mat-raised-button color="warn" (click)="onClick()" tabindex="-1">
                                            Cancel
                                        </button>
                                        <button mat-raised-button color="primary" [disabled]="!editForm.valid"
                                            (click)="onSubmit()">
                                            <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
                                            <b>Submit</b>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
