        <div class="xml-box" *ngIf="xmlContent; else noReport">

          <!-- Row 1: Action buttons -->
          <div class="edit-actions">
            <div class="btn-group">
              <button class="btn small-btn" (click)="toggleEditMode()" [disabled]="isSaving">
                <i class="far fa-eye"></i>
                {{ editMode ? "Preview XML" : "Edit XML" }}
              </button>
            </div>

            <div class="btn-divider"></div>

            <div class="btn-group" *ngIf="editMode">
              <button class="btn save-btn" (click)="saveEditedXml()" [disabled]="isSaving">
                <ng-container *ngIf="!isSaving; else loading">
                  <i class="far fa-save"></i> Save Changes
                </ng-container>
                <ng-template #loading>
                  <span class="spinner"></span>Saving...
                </ng-template>
              </button>
              <button class="btn undo-btn" (click)="undoXmlChanges()" [disabled]="isSaving">
                <i class="far fa-undo"></i> Undo Changes
              </button>
              <button class="btn undo-btn" (click)="undoXmlStep()" [disabled]="undoStack.length === 0 || isSaving">
                <i class="far fa-corner-up-left"></i> Undo Step
              </button>
            </div>
          </div>

          <!-- Row 2: Find & Replace (only in edit mode) -->
          <div class="find-replace-bar" *ngIf="editMode">
            <div class="find-group">
              <label>Find</label>
              <input type="text" placeholder="Search in XML…" [(ngModel)]="searchTerm" (input)="findMatches()"
                class="find-input" />
              <button class="btn mini-btn" (click)="findPrev()">Prev</button>
              <button class="btn mini-btn mini-btn-accent" (click)="findNext()">Next</button>
            </div>
            <div class="bar-divider"></div>
            <div class="replace-group">
              <label>Replace</label>
              <input type="text" placeholder="Replace with…" [(ngModel)]="replaceTerm" class="replace-input" />
              <button class="btn mini-btn" (click)="replaceOne()">Replace</button>
              <button class="btn mini-btn" (click)="replaceAll()">Replace All</button>
            </div>
          </div>

          <!-- Editor / Preview -->
          <div *ngIf="editMode">
            <div #xmlEditor contenteditable="true" [innerHTML]="formattedXml" (input)="onXmlEdit($event)"
              class="xml-editor" spellcheck="false"></div>
          </div>
          <div *ngIf="!editMode" [innerHTML]="formattedXml" class="xml-preview"></div>

        </div>
        <ng-template #noReport>
          <p>No report data available. Please generate a report first.</p>
        </ng-template>

        <div class="side-content">
          <div class="download-buttons">
            <button class="btn gold-btn" (click)="downloadXML()" [disabled]="isDownloadingXML">
              <ng-container *ngIf="!isDownloadingXML; else xmlLoading">Download XML</ng-container>
              <ng-template #xmlLoading>Download XML</ng-template>
            </button>
            <button class="btn dark-btn" (click)="downloadZIP(reportId)" [disabled]="isDownloadingZIP[reportId]">
              <ng-container *ngIf="!isDownloadingZIP[reportId]; else zipLoading">Download ZIP</ng-container>
              <ng-template #zipLoading>Download ZIP</ng-template>
            </button>
          </div>

          <div class="secure-box">
            <h3>Secure Repository</h3>
            <div class="status">
              <span class="check">✔</span>
              <p>All reports securely stored</p>
            </div>
            <p class="description">
              Reports are encrypted and stored in a secure repository.
            </p>
          </div>
        </div>
      </div>
    </section>
  </div>
</section>
