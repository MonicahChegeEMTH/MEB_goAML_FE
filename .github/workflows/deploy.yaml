name: Bahati Dairy Angular App Deployment

on:
  push:
    branches:
      - michael  # Deploy only when changes hit my branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Build Angular app
      run: npm run build --configuration=production

    - name: Deploy to AWS EC2
      env:
        PRIVATE_KEY: ${{ secrets.dairy_key }}
        HOST: ${{ secrets.dairy_host }}
        USER: ${{ secrets.dairy_user }}
      run: |
        sshpass -p "$PRIVATE_KEY" scp -r dist/* $USER@$HOST:/var/www/dev/
        sshpass -p "$PRIVATE_KEY" ssh $USER@$HOST "sudo systemctl restart nginx"
